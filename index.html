const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw){
  const ec = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', ec.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.iter, hash:'SHA-256' },
    baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const plainBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(ENC.iv) }, key, b64(ENC.data));
  return new TextDecoder().decode(plainBuf);
}
document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const err = document.getElementById('err'); err.textContent = '';
  try{
    const html = await unlock(document.getElementById('pw').value);
    sessionStorage.setItem('econland_ok','1');
    document.open(); document.write(html); document.close();
  }catch(_){ err.textContent = 'Palavra-passe incorreta.'; }
});
